env_server:
  pool_size: 4
  prewarm_splits: ["train"]
  shared_pool: true
  worker_start_timeout_s: 300
  worker_request_timeout_s: 180

appworld:
  # Root should normally be /tmp/mlf-runtime/data/appworld after materialization.
  root: ${APPWORLD_ROOT}
  dataset_name: train
  # AppWorld commonly uses dev/test_normal/test_challenge for evaluation, depending on release data.
  eval_dataset_name: dev
  difficulty: null
  num_tasks_per_scenario: null
  only_tagged: null
  num_tasks: null
  max_interactions: 40
  raise_on_failure: false
  experiment_prefix: slime_agent_env
  include_api_overview: true

max_turns: 40
action_max_tokens: 1024
format_error_context_tokens: 0
generation_stop:
  - "<|im_end|>"
policy_timeout_s: 120
env_request_timeout_s: 660
