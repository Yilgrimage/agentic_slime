task:
  split: train
max_turns: 40

timeouts:
  policy_s: 120
  env_request_s: 660

interaction:
  mode: text_action
  text_action:
    tag: code

generation:
  stop:
    - "<|im_end|>"

observation:
  include_actions: false

action:
  legacy_text_as_code: false

reward:
  source: score
  outcome: 10.0
  format:
    valid: 0.0
    invalid: -0.1

env_server:
  pool_size: 4
  prewarm_splits: ["train"]
  shared_pool: true
  worker_start_timeout_s: 300
  worker_request_timeout_s: 180

appworld:
  root: ${APPWORLD_ROOT}
  dataset_name: train
  eval_dataset_name: dev
  difficulty: null
  num_tasks_per_scenario: null
  only_tagged: null
  num_tasks: null
  max_interactions: 40
  raise_on_failure: false
  experiment_prefix: slime_agent_env
  include_api_overview: true
